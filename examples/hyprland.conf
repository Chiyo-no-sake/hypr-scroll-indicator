# hypr-scroll-indicator — Hyprland integration example
#
# Add these snippets to your ~/.config/hypr/hyprland.conf

# Layer rules
layerrule = noanim, hypr-scroll-indicator
layerrule = blur, hypr-scroll-indicator

# Autostart (wrapper handles LD_PRELOAD automatically)
exec-once = hypr-scroll-indicator

# With custom colors:
# exec-once = hypr-scroll-indicator --color-primary "#E0A0FF" --color-secondary "#A060CC"

# With matugen colors file:
# exec-once = hypr-scroll-indicator --colors-file ~/.config/hypr/colors.conf

# Auto-detect animation bezier from your hyprland config:
# exec-once = hypr-scroll-indicator --hyprland-conf ~/.config/hypr/hyprland.conf
